<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation Form</title>
    <style>
        /* ===== 1. CORE STYLES & RESET ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ප්‍රධාන පිටුවේ ඇති ඇණවුම් කරන බොත්තම (Main Page Button) */
        .fill-details-btn {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .fill-details-btn:hover {
            transform: scale(1.03);
        }

        /* ===== 2. MODAL & OVERLAY STYLES ===== */
        .form-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .form-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: none;
            overflow-y: auto; /* Desktop & Mobile සක්‍රීයව ස්ක්‍රෝල් වීමට */
            -webkit-overflow-scrolling: touch;
        }

        /* Form එක සක්‍රීය වූ විට පෙන්වීම */
        .form-modal.active, .form-overlay.active {
            display: block;
        }

        /* ===== 3. FORM CONTAINER STYLES ===== */
        .form-container {
            background: #ffffff;
            width: 92%;
            max-width: 500px;
            margin: 40px auto; /* උඩ සහ යටින් ඉඩ තැබීම */
            padding: 30px;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        /* Close Button */
        .form-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
        }

        .form-close:hover {
            color: #000;
        }

        /* Header & Progress */
        .form-header {
            margin-bottom: 25px;
            text-align: center;
        }

        .form-header h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 6px;
        }

        .form-header p {
            font-size: 14px;
            color: #666;
        }

        /* ===== 4. LANGUAGE SWITCHER ===== */
        .lang-switch-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 8px;
        }

        .lang-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            color: #555;
        }

        .lang-btn.active {
            background: #ffffff;
            color: #25D366;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ===== 5. FORM INPUTS ===== */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #25D366;
        }

        .form-group textarea {
            resize: vertical;
            height: 80px;
        }

        /* WhatsApp Order Button */
        .order-btn {
            width: 100%;
            background-color: #25D366;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: background 0.2s;
            margin-top: 10px;
        }

        .order-btn:hover {
            background-color: #1ebd58;
        }

        /* ===== 6. MOBILE RESPONSIVE FIXES ===== */
        @media screen and (max-width: 480px) {
            .form-modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                overflow-y: auto !important; /* Force Scroll */
                background: #ffffff; /* මොබයිල් වලදී මුළු Screen එකම සුදු පාට වේ */
            }

            .form-modal.active {
                display: block !important;
            }

            .form-container {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 24px 20px;
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh; /* කීබෝඩ් එක ආවත් ස්ක්‍රෝල් කිරීමට ඉඩ ලබාදේ */
            }

            .form-overlay {
                display: none !important; /* මොබයිල් වලට Overlay අවශ්‍ය නොවේ */
            }

            .form-close {
                top: 20px;
                right: 20px;
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- ප්‍රධාන පිටුවේ බොත්තම (මෙය ඔබගේ වෙබ් අඩවියේ ඇති බොත්තමට ආදේශ කරන්න) -->
    <button class="fill-details-btn">Buy Now (ඇණවුම් කරන්න)</button>

    <!-- FORM OVERLAY (Desktop සඳහා පසුබිම අඳුරු කිරීමට) -->
    <div class="form-overlay"></div>

    <!-- MAIN FORM MODAL -->
    <div class="form-modal">
        <div class="form-container">
            <span class="form-close">&times;</span>
            
            <div class="form-header">
                <h2>ඔබේ ඇණවුම සනාථ කරන්න</h2>
                <p>කරුණාකර නිවැරදි තොරතුරු ඇතුළත් කරන්න</p>
            </div>

            <!-- භාෂා මාරු කිරීමේ බොත්තම් -->
            <div class="lang-switch-container">
                <button class="lang-btn active" data-lang="si">සිංහල</button>
                <button class="lang-btn" data-lang="en">English</button>
            </div>

            <!-- ඇණවුම් ෆෝරමය -->
            <form id="whatsappOrderForm">
                <div class="form-group">
                    <label>ඔබේ නම (Full Name) *</label>
                    <input type="text" id="custName" required placeholder="उदा: Kamalsiri Perera">
                </div>

                <div class="form-group">
                    <label>දුරකථන අංකය (Phone Number) *</label>
                    <input type="tel" id="custPhone" required placeholder="उदा: 0771234567">
                </div>

                <div class="form-group">
                    <label>ලිපිනය (Delivery Address) *</label>
                    <textarea id="custAddress" required placeholder="उदा: No. 12, Galle Road, Colombo"></textarea>
                </div>

                <div class="form-group">
                    <label>ළඟම ඇති ප්‍රධාන නගරය (Nearest Town) *</label>
                    <input type="text" id="custCity" required placeholder="उदा: Colombo 03">
                </div>

                <div class="form-group">
                    <label>අමතර සටහන් (Optional Notes)</label>
                    <textarea id="custNotes" placeholder="उदा: Deliver after 5 PM"></textarea>
                </div>

                <button type="submit" class="order-btn">
                    <!-- WhatsApp SVG Icon -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="fill: currentColor;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    <span>WhatsApp හරහා ඇණවුම් කරන්න</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ===== JavaScript Logic ===== -->
    <script>
        // 1. Elements හඳුනා ගැනීම
        const formModal = document.querySelector('.form-modal');
        const fillDetailsBtn = document.querySelector('.fill-details-btn');
        const formCloseBtn = document.querySelector('.form-close');
        const formOverlay = document.querySelector('.form-overlay');
        const orderForm = document.getElementById('whatsappOrderForm');
        const langBtns = document.querySelectorAll('.lang-btn');

        // 2. Open Modal (ෆෝම් එක ඇරීම සහ පසුබිම ලොක් කිරීම)
        function openFormModal() {
            formModal.classList.add('active');
            if(formOverlay) formOverlay.classList.add('active');
            
            // [MOBILE SCROLL CONTROLLER] 
            document.body.style.overflow = 'hidden'; 
            formModal.style.display = 'block';
            formModal.scrollTop = 0;
        }

        // 3. Close Modal (ෆෝම් එක වැසීම සහ පසුබිම යථා තත්ත්වයට පත් කිරීම)
        function closeFormModal() {
            formModal.classList.remove('active');
            if(formOverlay) formOverlay.classList.remove('active');
            
            document.body.style.overflow = 'auto';
            formModal.style.display = 'none';
        }

        // 4. Click Events සක්‍රීය කිරීම
        if (fillDetailsBtn) fillDetailsBtn.addEventListener('click', openFormModal);
        if (formCloseBtn) formCloseBtn.addEventListener('click', closeFormModal);
        if (formOverlay) formOverlay.addEventListener('click', closeFormModal);

        // ESC Key එකෙන් Close වීම
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && formModal.classList.contains('active')) {
                closeFormModal();
            }
        });

        // 5. LANGUAGE TRANSLATION LOGIC (සිංහල / English)
        const translations = {
            si: {
                title: "ඔබේ ඇණවුම සනාථ කරන්න",
                subtitle: "කරුණාකර නිවැරදි තොරතුරු ඇතුළත් කරන්න",
                name: "ඔබේ නම (Full Name) *",
                phone: "දුරකථන අංකය (Phone Number) *",
                address: "ලිපිනය (Delivery Address) *",
                city: "ළඟම ඇති ප්‍රධාන නගරය (Nearest Town) *",
                notes: "අමතර සටහන් (Optional Notes)",
                btn: "WhatsApp හරහා ඇණවුම් කරන්න"
            },
            en: {
                title: "Confirm Your Order",
                subtitle: "Please enter accurate delivery details",
                name: "Full Name *",
                phone: "Phone Number *",
                address: "Delivery Address *",
                city: "Nearest Town *",
                notes: "Optional Notes (e.g., Land-mark)",
                btn: "Order via WhatsApp"
            }
        };

        langBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                langBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const lang = this.getAttribute('data-lang');
                
                formModal.querySelector('.form-header h2').textContent = translations[lang].title;
                formModal.querySelector('.form-header p').textContent = translations[lang].subtitle;
                
                const labels = formModal.querySelectorAll('.form-group label');
                labels[0].textContent = translations[lang].name;
                labels[1].textContent = translations[lang].phone;
                labels[2].textContent = translations[lang].address;
                labels[3].textContent = translations[lang].city;
                labels[4].textContent = translations[lang].notes;
                
                formModal.querySelector('.order-btn span').textContent = translations[lang].btn;
            });
        });

        // 6. WHATSAPP DETAILED MESSAGE SENDING LOGIC
        orderForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // ඔයාගේ දුරකථන අංකය මෙතනට ඇතුළත් කරන්න (Country Code එකත් එක්ක: 94XXXXXXXXX)
            const whatsappNumber = "94771234567"; 

            // Form දත්ත ලබා ගැනීම
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const city = document.getElementById('custCity').value;
            const notes = document.getElementById('custNotes').value || "N/A";

            // පිළිවෙලට පණිවිඩය සකස් කිරීම
            const textMessage = `*New Order Confirmed!* 📦%0A%0A` +
                                `*Name:* ${encodeURIComponent(name)}%0A` +
                                `*Phone:* ${encodeURIComponent(phone)}%0A` +
                                `*Address:* ${encodeURIComponent(address)}%0A` +
                                `*Nearest Town:* ${encodeURIComponent(city)}%0A` +
                                `*Notes:* ${encodeURIComponent(notes)}`;

            // WhatsApp API එක වෙත යොමු කිරීම
            const whatsappURL = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${textMessage}`;
            
            // අලුත් Tab එකක විවෘත කිරීම
            window.open(whatsappURL, '_blank');
            
            // ෆෝම් එක වැසීම
            closeFormModal();
            orderForm.reset();
        });
    </script>
</body>
</html>
